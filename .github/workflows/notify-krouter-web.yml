name: Notify krouter-web

# Pings the krouter-web repo whenever the public surface (providers, changelog,
# provider PNGs) might have changed, so the site rebuilds with fresh data.
#
# Requires a repo secret `KROUTER_WEB_PAT` — a fine-scoped Personal Access Token
# with `repo:public_repo` scope on sifxprime/krouter-web (just enough to fire
# repository_dispatch). Without that secret the step is a no-op.

on:
  push:
    branches: [main]
    paths:
      - "src/shared/constants/providers.js"
      - "public/providers/**"
      - "CHANGELOG.md"
      - "package.json"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger krouter-web rebuild
        env:
          PAT: ${{ secrets.KROUTER_WEB_PAT }}
        run: |
          if [ -z "$PAT" ]; then
            echo "KROUTER_WEB_PAT not set — skipping notify."
            exit 0
          fi
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PAT" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/sifxprime/krouter-web/dispatches \
            -d '{"event_type":"krouter-release","client_payload":{"sha":"${{ github.sha }}","ref":"${{ github.ref }}"}}'
          echo "Dispatched krouter-release to krouter-web."
